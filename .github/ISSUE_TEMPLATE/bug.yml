name: Bug
description: 缺陷或回归
title: "[Bug] "
labels: ["type/bug"]
body:
  - type: textarea
    id: symptom
    attributes:
      label: 现象
      description: 发生了什么？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何稳定复现？
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
