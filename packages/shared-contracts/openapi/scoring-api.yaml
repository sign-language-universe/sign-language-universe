openapi: 3.1.0
info:
  title: Sign Language Universe Scoring API
  version: 0.3.0
paths:
  /:
    get:
      summary: Service landing endpoint
      responses:
        "200":
          description: Service entrypoint metadata
  /api/scoring/health:
    get:
      summary: Scoring service health check
      responses:
        "200":
          description: Service health
  /api/scoring/templates:
    get:
      summary: List available scoring templates
      responses:
        "200":
          description: Available templates
  /api/scoring/worker/warmup:
    post:
      summary: Start and ping the optional Holistic worker
      parameters:
        - in: query
          name: wait_for_ready_sec
          schema:
            type: number
            minimum: 1
            maximum: 300
            default: 180
      responses:
        "200":
          description: Worker warmup result
  /api/scoring/score:
    post:
      summary: Submit browser Holistic landmarks, sign language frames, or a video path for scoring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoreRequest"
      responses:
        "200":
          description: Score result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreResponse"
components:
  schemas:
    FrameSlice:
      type: object
      required: [index, timestamp_ms, image_base64]
      properties:
        index:
          type: integer
          minimum: 0
        timestamp_ms:
          type: integer
          minimum: 0
        image_base64:
          type: string
    LandmarkPoint:
      oneOf:
        - type: array
          minItems: 3
          items:
            type: number
        - type: object
          additionalProperties: true
          properties:
            x:
              type: number
            y:
              type: number
            z:
              type: number
            visibility:
              type: number
            presence:
              type: number
    LandmarkRow:
      type: object
      required: [index, timestamp_ms]
      properties:
        index:
          type: integer
          minimum: 0
        timestamp_ms:
          type: integer
          minimum: 0
        pose_landmarks:
          type: array
          items:
            $ref: "#/components/schemas/LandmarkPoint"
        left_hand_landmarks:
          type: array
          items:
            $ref: "#/components/schemas/LandmarkPoint"
        right_hand_landmarks:
          type: array
          items:
            $ref: "#/components/schemas/LandmarkPoint"
        face_landmarks:
          type: array
          items:
            $ref: "#/components/schemas/LandmarkPoint"
        face_core_landmarks:
          type: array
          items:
            $ref: "#/components/schemas/LandmarkPoint"
        frame_weight:
          type: number
          exclusiveMinimum: 0
          default: 1
        image_width:
          type: integer
          minimum: 1
        image_height:
          type: integer
          minimum: 1
        processing_ms:
          type: integer
          minimum: 0
    ScoreRequest:
      type: object
      required: [template_id, input_type]
      properties:
        template_id:
          type: string
          examples: ["flower", "jump"]
        input_type:
          type: string
          enum: ["landmark_rows", "frame_slices", "video_path"]
        frames:
          type: array
          items:
            $ref: "#/components/schemas/FrameSlice"
        landmark_rows:
          type: array
          description: Browser-side MediaPipe Holistic landmarks. This is the default GitHub Pages path.
          items:
            $ref: "#/components/schemas/LandmarkRow"
        video_path:
          type: string
        fps:
          type: number
          minimum: 1
          description: Browser capture frame rate hint.
        duration_ms:
          type: integer
          minimum: 0
          description: Browser capture duration in milliseconds.
        wait_for_ready_sec:
          type: number
          minimum: 1
          maximum: 180
          default: 45
          description: Maximum time the API may wait for the Holistic worker.
        client_meta:
          type: object
          additionalProperties: true
    ScoreResponse:
      type: object
      required: [request_id, template_id, score, level, score_valid, feedback, diagnostics]
      properties:
        request_id:
          type: string
        template_id:
          type: string
        score:
          type:
            - number
            - "null"
        level:
          type: string
          description: "excellent/good/needs_practice/retry, or integration modes such as holistic_capture_quality/browser_frame_fallback."
        score_valid:
          type: boolean
        feedback:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              message:
                type: string
        diagnostics:
          type: object
          additionalProperties: true
