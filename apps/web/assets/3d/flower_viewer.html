<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Viewer - 花朵</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }
    body { background: #0a0a2a; overflow: hidden; font-family: system-ui, sans-serif; }
    model-viewer { width:100vw; height:100vh; }
    .label {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: #ffd93d; font-size: 18px; font-weight: 700;
      background: rgba(0,0,0,0.5); padding: 8px 24px;
      border-radius: 20px; backdrop-filter: blur(8px);
      pointer-events: none; z-index: 10;
    }
  </style>
</head>
<body>
  <model-viewer
    src="flower.glb"
    camera-controls
    auto-rotate
    rotation-per-second="30deg"
    shadow-intensity="1"
    environment-image="neutral"
    exposure="1.2"
    style="background: #0a0a2a;"
  ></model-viewer>
  <div class="label>🌸 花朵 Flower — 评分≥80时将出现此动画</div>
</body>
</html>
